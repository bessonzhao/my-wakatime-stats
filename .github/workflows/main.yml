name: Waka Readme

on:
  # 定时执行：每天凌晨 0:00
  schedule:
    - cron: '0 0 * * *'
  # 也可以手动触发
  workflow_dispatch:

jobs:
  update-readme:
    name: Update Readme with Waka Stats
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Waka Readme
        uses: athul/waka-readme@v0.3.1
        with:
          # GitHub access token (使用默认的 github.token)
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 你的 Wakatime API Key (需要在 GitHub Secrets 中配置)
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          # 你的 GitHub 仓库
          REPOSITORY: ${{ github.repository }}
          # 是否显示周数和日期标题
          SHOW_TITLE: false
          # README 中显示的 section 名称
          SECTION_NAME: 'waka'
          # 进度条样式
          BLOCKS: '░▒▓█'
          # 代码块语言
          CODE_LANG: 'txt'
          # 时间范围：last_7_days / last_30_days / last_6_months / last_year / all_time
          TIME_RANGE: 'last_7_days'
          # 显示的语言数量
          LANG_COUNT: 5
          # 是否显示每个语言花费的时间
          SHOW_TIME: true
          # 是否显示总编码时间
          SHOW_TOTAL: false
          # 是否显示包含未分类语言的总时间
          SHOW_MASKED_TIME: false
          # 是否在遇到 'Other' 语言时停止
          STOP_AT_OTHER: false
          # 忽略的语言（空格分隔）
          IGNORED_LANGUAGES: ''
          # 提交消息
          COMMIT_MESSAGE: '📊 Updated waka-readme graph with new metrics'
